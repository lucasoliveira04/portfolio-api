quarkus:
  datasource:
    db-kind: postgresql
    username: postgres
    password: 1234567
    jdbc:
      url: jdbc:postgresql://localhost:5432/portfolio_db

  hibernate-orm:
    log:
      sql: true
    format-sql: true
    schema-management:
      strategy: validate
    database:
      generation: validate

  flyway:
    migrate-at-start: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-at-start: true

  http:
    port: 8080